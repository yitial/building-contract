<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>授权码生成器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
      background: #0b0b1a;
      color: #e0e0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #13132a;
      border: 1px solid #1e1e40;
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }
    .logo {
      text-align: center;
      margin-bottom: 8px;
    }
    .logo-emoji {
      font-size: 48px;
      line-height: 1;
      margin-bottom: 10px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      text-align: center;
    }
    .subtitle {
      font-size: 13px;
      color: #6668a0;
      text-align: center;
      margin-top: 4px;
      margin-bottom: 32px;
    }
    .field {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #8080b0;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 13px 16px;
      background: #0f0f22;
      border: 1px solid #252550;
      border-radius: 10px;
      color: #fff;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus, input[type="password"]:focus {
      border-color: #6c6cff;
    }
    .hint {
      font-size: 11px;
      color: #5a5a88;
      margin-top: 6px;
      line-height: 1.5;
    }
    .hint.warn {
      color: #ff9f43;
    }
    .btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #6c6cff, #9b6cff);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 8px;
    }
    .btn:hover { opacity: 0.9; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .error-msg {
      color: #ff6b6b;
      font-size: 13px;
      text-align: center;
      margin-top: 12px;
      min-height: 20px;
    }
    .result {
      display: none;
      margin-top: 28px;
      padding: 24px;
      background: #0d0d20;
      border: 1px solid #2a2a60;
      border-radius: 14px;
      text-align: center;
    }
    .result.show { display: block; }
    .result-label {
      font-size: 11px;
      color: #6668a0;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }
    .result-code {
      font-size: 26px;
      font-weight: 800;
      color: #fff;
      letter-spacing: 4px;
      font-family: 'Courier New', monospace;
      background: #13132a;
      padding: 14px 20px;
      border-radius: 10px;
      border: 1px solid #2a2a60;
      word-break: break-all;
      line-height: 1.6;
      margin-bottom: 16px;
    }
    .copy-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 24px;
      background: #1e1e44;
      border: 1px solid #3a3a70;
      border-radius: 8px;
      color: #b0b0e0;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .copy-btn:hover { background: #252560; color: #fff; }
    .copy-btn.copied { color: #4fffb0; border-color: #4fffb0; }
    .security-note {
      margin-top: 32px;
      padding: 18px;
      background: #0d0d20;
      border-radius: 12px;
      border: 1px solid #1e1e3e;
    }
    .security-note h3 {
      font-size: 13px;
      color: #8080c0;
      margin-bottom: 10px;
    }
    .security-note ul {
      list-style: none;
      padding: 0;
    }
    .security-note li {
      font-size: 12px;
      color: #5a5a88;
      margin-bottom: 6px;
      padding-left: 16px;
      position: relative;
    }
    .security-note li::before {
      content: '·';
      position: absolute;
      left: 4px;
      color: #6c6cff;
    }
    .divider {
      border: none;
      border-top: 1px solid #1e1e3e;
      margin: 24px 0;
    }
    .key-reminder {
      text-align: center;
      font-size: 11px;
      color: #4a4a78;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-emoji">🔑</div>
      <h1>授权码生成器</h1>
      <p class="subtitle">装修合同智能审查 · 授权管理</p>
    </div>

    <div class="field">
      <label>用户昵称</label>
      <input type="text" id="userName" placeholder="例如：泉州张三" autocomplete="off">
      <p class="hint">填写粉丝/用户的昵称，便于你管理记录</p>
    </div>

    <button class="btn" id="genBtn" onclick="generateCode()">🔑 生成授权码</button>
    <div class="error-msg" id="errorMsg"></div>

    <div class="result" id="result">
      <div class="result-label">✅ 授权码（发给用户即可使用）</div>
      <div class="result-code" id="resultCode">WB-XXXX-XXXX</div>
      <button class="copy-btn" id="copyBtn" onclick="copyCode()">📋 复制授权码</button>
    </div>

    <hr class="divider">

    <div class="security-note">
      <h3>📌 使用说明</h3>
      <ul>
        <li>输入用户昵称（用于你管理记录）即可生成授权码</li>
        <li>码会自动注册到云端，用户打开工具输入后绑定设备</li>
        <li>同一昵称不可重复生成，要撤销请去 GitHub Gist 修改</li>
        <li>同一授权码只能绑定一个设备，换设备需重新生成</li>
      </ul>
    </div>

    <p class="key-reminder">生成器版本 v3 · 云端注册版 · 2026/4/28</p>
  </div>

<script>
// ── 配置 ──────────────────────────────────────────────────────────────────────
const GIST_ID = 'e0a346971d3e5401d7d20baec9ffe87d';
const GITHUB_TOKEN = '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';
const GIST_API = `https://api.github.com/gists/${GIST_ID}`;
const MASTER_KEY = 'wmz123'; // 与 index.html 保持一致
// ─────────────────────────────────────────────────────────────────────────────

let generatedCode = '';

// Gist 读写
async function gistGet() {
  const r = await fetch(GIST_API, {
    headers: { 'Authorization': `Bearer ${GITHUB_TOKEN}`, 'Accept': 'application/vnd.github+json' }
  });
  if (!r.ok) throw new Error(`读取失败 ${r.status}`);
  return r.json();
}
async function gistPatch(body) {
  const r = await fetch(GIST_API, {
    method: 'PATCH',
    headers: { 'Authorization': `Bearer ${GITHUB_TOKEN}`, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github+json' },
    body: JSON.stringify(body)
  });
  if (!r.ok) throw new Error(`写入失败 ${r.status}`);
  return r.json();
}

// 生成授权码（格式型：WB + 8位随机）
async function generateCode() {
  const nameEl = document.getElementById('userName');
  const errorEl = document.getElementById('errorMsg');
  const resultEl = document.getElementById('result');
  const btn = document.getElementById('genBtn');

  const name = nameEl.value.trim();

  errorEl.textContent = '';
  resultEl.classList.remove('show');

  if (!name) { errorEl.textContent = '⚠️ 请输入用户昵称'; return; }

  btn.disabled = true;
  btn.textContent = '⏳ 注册中…';
  errorEl.textContent = '';

  try {
    // 1. 生成 WB-XXXX-XXXX 格式码
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
    let hash = '';
    const arr = new Uint8Array(8);
    crypto.getRandomValues(arr);
    arr.forEach(n => hash += chars[n % chars.length]);
    generatedCode = `WB-${hash.substring(0, 4)}-${hash.substring(4)}`;

    // 2. 读取现有 Gist 数据
    const data = await gistGet();
    const f = data.files && data.files['license.json'];
    let licenses = {};
    if (f && f.content) {
      try { licenses = JSON.parse(f.content); } catch {}
    }

    // 3. 检查是否已有相同昵称的码
    const existing = Object.entries(licenses).find(([, v]) => v.name === name);
    if (existing) {
      errorEl.textContent = `⚠️「${name}」已有授权码 ${existing[0]}，请勿重复生成`;
      btn.disabled = false;
      btn.textContent = '生成授权码';
      return;
    }

    // 4. 注册新码到 Gist（无设备绑定，待激活）
    licenses[generatedCode] = {
      name,
      device: null,
      active: true,
      created: new Date().toISOString()
    };
    await gistPatch({ files: { 'license.json': { content: JSON.stringify(licenses, null, 2) } } });

    // 5. 显示结果
    document.getElementById('resultCode').textContent = generatedCode;
    resultEl.classList.add('show');
    document.getElementById('copyBtn').textContent = '📋 复制授权码';
    document.getElementById('copyBtn').classList.remove('copied');
    keyEl.blur();

  } catch (e) {
    errorEl.textContent = `❌ 失败：${e.message}（请确认 Gist 可写且 Token 有效）`;
    console.error(e);
  } finally {
    btn.disabled = false;
    btn.textContent = '生成授权码';
  }
}

// 复制授权码
function copyCode() {
  if (!generatedCode) return;
  navigator.clipboard.writeText(generatedCode).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✅ 已复制！';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '📋 复制授权码';
      btn.classList.remove('copied');
    }, 2500);
  }).catch(() => {
    // 降级：选中文本
    const el = document.getElementById('resultCode');
    const range = document.createRange();
    range.selectNodeContents(el);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
  });
}

// 回车键触发
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') generateCode();
});
</script>
</body>
</html>
